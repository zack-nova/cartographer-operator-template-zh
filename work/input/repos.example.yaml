schema_version: 1
defaults:
  clone_root: ../cache/clones
  analysis_root: ../analysis
  output_root: ../output
  plan_root: ../plans
  report_root: ../reports
  continue_on_error: true
  auto_approve: true
repos:
  - repo_locator: git@github.com:org/repo-a.git
    ref: main
    target_slug: repo-a
    harness_id: repo-a
    orbit_id: workspace
    exclude_paths: []
    rolling_paths: []
